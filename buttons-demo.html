<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Buttons Demo - Campus Connect</title>
  <link rel="stylesheet" href="components/buttons/buttons.css">
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,Arial;margin:24px;background:#f6f7fb;color:#0f172a}
    h1{font-size:20px;margin-bottom:8px}
    .panel{background:#fff;padding:16px;border-radius:10px;box-shadow:0 6px 18px rgba(2,6,23,.06)}
  </style>
</head>
<body>
  <h1>Buttons demo</h1>
  <div class="panel">
    <p>Examples of small, accessible buttons with behaviors.</p>

    <!-- insert component examples -->
    <div id="buttons-root">
      <!-- copy of component fragment -->
      <div class="buttons-row">
        <button class="btn btn--primary" data-cc-action="navigate" data-cc-target="findServices.html" aria-label="Find services">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" aria-hidden="true"><path d="M21 21l-4.35-4.35"></path><circle cx="11" cy="11" r="6"></circle></svg>
          <span class="label">Find Services</span>
        </button>

        <button class="btn btn--toggle" data-cc-action="toggle-fav" data-cc-id="demo-service">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" aria-hidden="true"><path d="M12 21s-6.716-4.686-9-7.174C.472 11.979 2 6 7 4c2.5-1 5.5 1 5 4 0 0 .6-2 3-3 2.075-.857 5.5.75 6 4 1 5-5 9-5 9z"></path></svg>
          <span class="label">Save</span>
        </button>

        <button class="btn btn--icon" data-cc-action="open-modal" data-cc-title="Contact provider" data-cc-message="This would open the contact form in the real app">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        </button>
      </div>
    </div>
  </div>

  <script src="components/buttons/buttons.js"></script>
</body>
</html>
