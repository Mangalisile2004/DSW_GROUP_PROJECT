<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Your Hustle</title>
    <link rel="stylesheet" href="startHustle.css">
</head>
<body>
     
    <header>
        <div class="logo">
            <h1><i>Campus Connect</i></h1>
        </div>
        <button type="button" class="menu-toggle" onclick="toggleMenu()">☰</button>

        <nav class="nav-links">
            <a href="#" class="active">Home</a>
            <a href="#" onclick="showAlert('About')">About</a>
            <a href="#" onclick="showAlert('How It Works')">How It Works</a>
            <a href="#" onclick="showAlert('Contact')">Contact</a>
        </nav>
    
        <div class="auth-buttons">
            <button type="button" class="btn-login" onclick="showAlert('Login')">Login</button>
            <button type="button" class="btn-signup" onclick="showAlert('Sign Up')">Sign Up</button>
        </div>
    </header>

    <!-- Simple Add Service Form -->
    <form id="addServiceForm" class="service-form">
        <a href="#" class="back-link" onclick="history.back(); return false;">← Back</a>
        
        <h1>List Your Service</h1>

        <label for="serviceTitle">Service Title *</label>
        <input type="text" id="serviceTitle" name="serviceTitle" placeholder="e.g., Math Tutoring" required>

        <label for="serviceCategory">Category *</label>
        <select id="serviceCategory" name="serviceCategory" required>
            <option value="">Select a category</option>
            <option value="Tutoring">Tutoring</option>
            <option value="Photography">Photography</option>
            <option value="Graphic Design">Graphic Design</option>
            <option value="Hair & Beauty">Hair & Beauty</option>
            <option value="Web Development">Web Development</option>
            <option value="IT Support">IT Support</option>
            <option value="Music Lessons">Music Lessons</option>
            <option value="Fitness Training">Fitness Training</option>
        </select>

        <label for="serviceDescription">Description *</label>
        <textarea id="serviceDescription" name="serviceDescription" placeholder="Describe your service in detail..." rows="4" required></textarea>

        <label for="servicePrice">Price (ZAR) *</label>
        <input type="number" id="servicePrice" name="servicePrice" placeholder="e.g., 250" required>

        <label for="priceType">Price Type</label>
        <select id="priceType" name="priceType">
            <option value="/hr">Per Hour</option>
            <option value="/session">Per Session</option>
            <option value="/month">Per Month</option>
        </select>

        <label for="campus">Campus</label>
        <input type="text" id="campus" name="campus" placeholder="e.g., UJ APB Campus">

        <label for="availability">Availability</label>
        <input type="text" id="availability" name="availability" placeholder="e.g., Mon-Fri, 3-7 PM">

        <button type="submit" class="publish-btn">Publish Service</button>
    </form>

    <div id="messageBox" class="message-box" style="display:none;"></div>

    <script src="startHustle.js"></script>
</body>
</html>
