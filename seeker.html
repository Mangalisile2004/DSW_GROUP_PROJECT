<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Seeker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
    <div class="logo">
      <h1><i>Campus Connect</i></h1>
    </div>
  </header>

  <section class="signup-section seeker">
  <h2>Sign Up as a Service Seeker</h2>
  <form class="signup-form" onsubmit="return validateSignupUser(event)">
    <label for="seeker-name">Full Names</label>
    <input type="text" id="seeker-name" name="seeker-name" placeholder="Enter your name" required>

    <label for="seeker-name">Surname</label>
    <input type="text" id="seeker-surname" name="seeker-surname" placeholder="Enter your surname" required>

    <label for="seeker-email">Email Address</label>
    <input type="email" id="seeker-email" name="seeker-email" placeholder="Enter your email" required>

    <label for="seeker-student-number">Student Number</label>
    <input type="number" id="seeker-student-number" name="seeker-student-number" placeholder="Enter your student number" required>

    <label for="seeker-password">Password</label>
    <input type="password" id="seeker-password" name="seeker-password" placeholder="Enter your password" required>

    <label for="seeker-confirm-password">Confirm Password</label>
    <input type="password" id="seeker-confirm-password" name="seeker-confirm-password" placeholder="Confirm your password" required>

    <label for="seeker-needs">What services are you looking for?</label>
    <textarea id="seeker-needs" name="seeker-needs" placeholder="e.g. Tutoring in Math, Photography for event" rows="3"></textarea>

    <button type="submit" class="btn-signup-form">Sign Up as Seeker</button>
  </form>
</section>

  <script src="main.js"></script>

</body>
</html>
